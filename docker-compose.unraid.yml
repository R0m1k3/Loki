# ───────────────────────────────────────────────────────────────────────────
# Loki — docker-compose pour Unraid (image préconstruite par GitHub)
#
# Aucun build ni git nécessaire sur Unraid : l'image est publiée automatiquement
# sur GHCR par GitHub Actions à chaque push sur main.
#
# MISE EN PLACE :
#   1) Crée les dossiers de données (terminal Unraid) :
#        mkdir -p /mnt/user/appdata/loki/workspace /mnt/user/appdata/loki/data
#   2) Plugin « Compose Manager » -> nouvelle stack -> colle ce fichier.
#   3) Adapte OLLAMA_HOST avec l'IP de ton serveur Unraid (Ollama sur :11434).
#   4) Compose Up. Interface : http://<ip-unraid>:8717
#
#   Mise à jour : Compose Down puis Up (l'option « pull image » récupère la
#   dernière version), ou « docker compose pull » avant Up.
#
# NB : si l'image ghcr.io/r0m1k3/loki est privée, rends-la publique une fois
#      (GitHub -> Packages -> loki -> Package settings -> Change visibility),
#      ou connecte Unraid à GHCR avec un token.
# ───────────────────────────────────────────────────────────────────────────
services:
  loki:
    image: ghcr.io/r0m1k3/loki:latest
    container_name: loki
    ports:
      # Un seul numéro de port, identique dedans/dehors (évite tout décalage).
      # Pour changer de port : modifie 8717 AUX DEUX endroits + PORT ci-dessous.
      - "8717:8717"
    environment:
      # >>> À ADAPTER : IP de ton serveur Unraid (Ollama écoute sur :11434) <<<
      - OLLAMA_HOST=http://192.168.1.10:11434
      - DEFAULT_MODEL=gemma4:12b
      - WORKSPACE_DIR=/workspace
      - DATA_DIR=/data
      - PORT=8717
      # Optionnel : instance SearxNG pour l'outil web_search (sinon DuckDuckGo)
      - SEARX_URL=
    volumes:
      - /mnt/user/appdata/loki/workspace:/workspace
      - /mnt/user/appdata/loki/data:/data
    extra_hosts:
      # Permet aussi OLLAMA_HOST=http://host.docker.internal:11434
      - "host.docker.internal:host-gateway"
    # Le HEALTHCHECK est défini dans l'image (utilise automatiquement le bon port).
    restart: unless-stopped
